services:
  ledger:
    build: .
    container_name: ledger-app
    restart: unless-stopped
    ports:
      - "32890:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SUPABASE_URL=${SUPABASE_URL:-}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:-}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ledger-frontend.rule=Host(`ledger.srv620544.hstgr.cloud`)"
      - "traefik.http.routers.ledger-frontend.entrypoints=websecure"
      - "traefik.http.routers.ledger-frontend.tls=true"
      - "traefik.http.routers.ledger-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.ledger-frontend.loadbalancer.server.port=3000"
    networks:
      - traefik

networks:
  traefik:
    external: true
